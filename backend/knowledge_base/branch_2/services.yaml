entries:
  - name: "Facial Treatments (ดูแลผิวหน้า)"
    description: "บริการดูแลผิวหน้าครบวงจร ทำความสะอาดเชิงลึก บำรุงผิว และรักษาสิว"
    duration: "60–90 นาที"
    suitable_for: "ทุกสภาพผิว"

  - name: "Botox (โบท็อกซ์)"
    description: "ฉีด Botox ลดริ้วรอย ลดกล้ามเนื้อขากรรไกร ผลิตภัณฑ์ FDA-approved"
    duration: "15–30 นาที"
    suitable_for: "ผู้ที่มีริ้วรอยจากการแสดงออก"

  - name: "Dermal Fillers (ฟิลเลอร์)"
    description: "ฉีดฟิลเลอร์ปรับรูปจมูก ริมฝีปาก คาง แก้ม วัสดุ Hyaluronic Acid"
    duration: "30–60 นาที"
    suitable_for: "ผู้ต้องการเพิ่มปริมาตรหรือปรับโครงหน้า"

  - name: "Breast Augmentation (เสริมหน้าอก)"
    description: >
      การผ่าตัดเสริมหน้าอกโดยศัลยแพทย์ผู้เชี่ยวชาญ ใช้ซิลิโคนเกรด Medical
      รูปทรง Teardrop หรือ Round ตามความต้องการ มีการปรึกษาก่อนผ่าตัดโดยละเอียด
    duration: "1.5–2.5 ชั่วโมง"
    suitable_for: "ผู้หญิงอายุ 18 ปีขึ้นไป ไม่ตั้งครรภ์ สุขภาพแข็งแรง"

  - name: "Liposuction (ดูดไขมัน)"
    description: >
      การดูดไขมันด้วยเทคนิค VASER Lipo หรือ Traditional Lipo
      เน้นบริเวณท้อง ต้นแขน ต้นขา และสะโพก เพื่อปรับรูปร่างให้กระชับ
    duration: "1–3 ชั่วโมง ขึ้นกับบริเวณที่ทำ"
    suitable_for: "ผู้ที่มีไขมันสะสมเฉพาะจุด น้ำหนักไม่เกิน BMI 30"
