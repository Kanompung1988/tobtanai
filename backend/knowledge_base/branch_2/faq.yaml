entries:
  - question: "การเสริมหน้าอกใช้เวลาพักฟื้นนานแค่ไหน?"
    answer: >
      โดยทั่วไปใช้เวลาพักฟื้น 5–7 วันสำหรับกิจกรรมทั่วไป
      ควรหยุดออกกำลังกายหนักอย่างน้อย 4–6 สัปดาห์
      และนัดติดตามผลกับแพทย์ที่ 1 สัปดาห์ และ 1 เดือน หลังผ่าตัด

  - question: "การดูดไขมันปลอดภัยไหม?"
    answer: >
      การดูดไขมันเป็นการผ่าตัดที่มีความเสี่ยง ควรทำโดยศัลยแพทย์ที่มีใบอนุญาต
      ในสถานพยาบาลที่ได้มาตรฐาน ความเสี่ยงที่พบบ้าง ได้แก่ บวมช้ำ
      ติดเชื้อ หรือผิวไม่เรียบ ซึ่งสามารถลดลงได้ด้วยการดูแลหลังผ่าตัดที่ถูกต้อง

  - question: "ซิลิโคนเสริมหน้าอกมีอายุการใช้งานเท่าไหร่?"
    answer: >
      ซิลิโคน Medical Grade ที่ใช้มีอายุการรับประกัน 10 ปี
      แต่สามารถอยู่ได้นานกว่านั้นหากไม่มีภาวะแทรกซ้อน
      แนะนำตรวจประจำปีและแจ้งแพทย์ทันทีหากมีอาการผิดปกติ

  - question: "สาขา 2 ตั้งอยู่ที่ไหน?"
    answer: >
      สาขา 2 ตั้งอยู่ในย่านใจกลางเมือง (ข้อมูลตัวอย่าง กรุณาอัปเดตที่อยู่จริง)
      เปิดบริการ จันทร์–เสาร์ 10:00–19:00 น.

  - question: "ก่อนผ่าตัดต้องเตรียมตัวอย่างไร?"
    answer: >
      ต้องงดอาหารและน้ำอย่างน้อย 6 ชั่วโมงก่อนผ่าตัด งดยาละลายลิ่มเลือด
      เช่น แอสไพริน อย่างน้อย 2 สัปดาห์ล่วงหน้า งดสูบบุหรี่อย่างน้อย 2 สัปดาห์
      และตรวจเลือดก่อนผ่าตัดตามที่แพทย์แนะนำ
