entries:
  - question: "Body Contouring กับ Liposuction ต่างกันอย่างไร?"
    answer: >
      Body Contouring เป็นการปรับรูปร่างแบบไม่ผ่าตัด เช่น HIFU, Coolsculpting, RF
      เหมาะสำหรับผู้ที่ต้องการกระชับหน้าท้องหรือลดเซลลูไลท์
      ส่วน Liposuction เป็นการผ่าตัดดูดไขมันออกจริง ผลลัพธ์ถาวรกว่า
      แต่ต้องพักฟื้นและมีความเสี่ยงสูงกว่า

  - question: "PRP คืออะไร?"
    answer: >
      PRP (Platelet-Rich Plasma) คือการนำเลือดของผู้รับบริการเองมาปั่นแยก
      จนได้พลาสมาที่มีเกล็ดเลือดเข้มข้น แล้วฉีดกลับเข้าผิวหนัง
      เพื่อกระตุ้นการสร้างคอลลาเจนและฟื้นฟูผิว ผลลัพธ์จะเห็นชัดหลัง 3–4 สัปดาห์

  - question: "Coolsculpting เจ็บไหม?"
    answer: >
      ในช่วงแรกของการรักษาอาจรู้สึกเย็นและดึงที่ผิวหนัง
      หลังจากนั้นบริเวณที่รักษาจะชาและไม่รู้สึกเจ็บ
      หลังเสร็จอาจมีอาการแดง บวม หรือชาเล็กน้อย 1–2 สัปดาห์

  - question: "สาขา Full Body เปิดกี่โมง?"
    answer: >
      สาขา Full Body เปิดบริการทุกวัน จันทร์–อาทิตย์ เวลา 10:00–20:00 น.
      (ข้อมูลตัวอย่าง กรุณาอัปเดตเวลาจริงก่อนใช้งาน)

  - question: "ต้องรับบริการกี่ครั้งถึงเห็นผล Body Contouring?"
    answer: >
      ส่วนใหญ่แนะนำ 4–8 ครั้ง ห่างกัน 1–2 สัปดาห์ต่อครั้ง
      ผลลัพธ์ขึ้นอยู่กับชนิดของอุปกรณ์และสภาพร่างกายแต่ละคน
      ควรออกกำลังกายและควบคุมอาหารร่วมด้วยเพื่อผลที่ดีกว่า
