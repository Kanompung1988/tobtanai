entries:
  - question: "โบท็อกซ์เจ็บไหม?"
    answer: >
      การฉีด Botox ใช้เข็มขนาดเล็กมาก ผู้รับบริการส่วนใหญ่รู้สึกเจ็บเล็กน้อย
      คล้ายการหยิกเบาๆ แพทย์สามารถทาครีมชาก่อนฉีดได้หากต้องการ

  - question: "ฟิลเลอร์อยู่ได้นานแค่ไหน?"
    answer: >
      ฟิลเลอร์ Hyaluronic Acid (HA) โดยทั่วไปอยู่ได้ 9–18 เดือน
      ขึ้นอยู่กับตำแหน่งที่ฉีดและการเผาผลาญของร่างกายแต่ละคน

  - question: "หลังทำเลเซอร์ต้องดูแลตัวเองอย่างไร?"
    answer: >
      หลังทำเลเซอร์ควรหลีกเลี่ยงแสงแดดโดยตรงอย่างน้อย 2 สัปดาห์
      ทาครีมกันแดด SPF 50+ ทุกวัน งดแกะหรือเกาผิวที่ลอก
      และดื่มน้ำเยอะๆ เพื่อช่วยให้ผิวฟื้นตัวเร็วขึ้น

  - question: "สาขาหลักเปิดกี่โมง?"
    answer: >
      สาขาหลักเปิดให้บริการทุกวัน จันทร์–ศุกร์ เวลา 10:00–20:00 น.
      เสาร์–อาทิตย์ เวลา 10:00–18:00 น.
      (ข้อมูลตัวอย่าง กรุณาอัปเดตเวลาจริงก่อนใช้งาน)

  - question: "ต้องนัดหมายล่วงหน้าไหม?"
    answer: >
      แนะนำให้นัดหมายล่วงหน้าอย่างน้อย 1 วัน โดยเฉพาะบริการเลเซอร์และฉีด
      เพื่อให้แพทย์มีเวลาเตรียมและให้คำปรึกษาอย่างละเอียด

  - question: "มีข้อห้ามสำหรับการฉีดโบท็อกซ์ไหม?"
    answer: >
      ไม่ควรฉีด Botox ในกรณีต่อไปนี้: ตั้งครรภ์หรือให้นมบุตร แพ้ส่วนประกอบของ
      Botulinum toxin มีโรคทางระบบประสาทกล้ามเนื้อ เช่น Myasthenia gravis
      หรืออยู่ในระหว่างรับยาปฏิชีวนะบางชนิด

  - question: "ราคาที่แสดงรวม VAT แล้วหรือไม่?"
    answer: >
      ราคาทั้งหมดที่แสดงเป็นราคาก่อน VAT 7% กรุณาตรวจสอบราคาสุทธิกับเจ้าหน้าที่
      ณ วันที่รับบริการอีกครั้ง
