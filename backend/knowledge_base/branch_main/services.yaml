entries:
  - name: "Facial Treatments (ดูแลผิวหน้า)"
    description: >
      บริการดูแลผิวหน้าครบวงจร ทั้งการทำความสะอาดเชิงลึก บำรุงผิว
      และการรักษาปัญหาผิวเฉพาะจุด เช่น สิว รอยดำ รูขุมขนกว้าง
    duration: "60–90 นาที"
    suitable_for: "ทุกสภาพผิว โดยเฉพาะผิวหน้าที่ต้องการความชุ่มชื้นและความกระจ่างใส"

  - name: "Botox (โบท็อกซ์)"
    description: >
      ฉีด Botox เพื่อลดริ้วรอย ลดกล้ามเนื้อขากรรไกร และปรับรูปหน้า
      ใช้ผลิตภัณฑ์มาตรฐาน FDA อเมริกา ปลอดภัย ออกฤทธิ์ 4–6 เดือน
    duration: "15–30 นาที"
    suitable_for: "ผู้ที่มีริ้วรอยจากการแสดงออก เช่น รอยหน้าผาก รอยหัวคิ้ว รอบดวงตา"

  - name: "Dermal Fillers (ฟิลเลอร์)"
    description: >
      ฉีดฟิลเลอร์เพื่อเติมปริมาตร ปรับรูปทรง เช่น ดั้งจมูก ริมฝีปาก
      คาง และแก้ม วัสดุ Hyaluronic Acid (HA) สลายได้เองตามธรรมชาติ
    duration: "30–60 นาที"
    suitable_for: "ผู้ที่ต้องการเพิ่มความชัดเจนของโครงหน้าหรือลดความลึกของร่องแก้ม"

  - name: "Laser Treatments (เลเซอร์)"
    description: >
      การรักษาด้วยเลเซอร์หลากหลายชนิด ได้แก่ เลเซอร์กระ ฝ้า รอยแผลเป็น
      และรักษาสิว มีทั้ง Fractional CO2, Q-Switch และ Pico Laser
    duration: "30–60 นาที ขึ้นกับบริเวณที่รักษา"
    suitable_for: "ผู้ที่มีปัญหาฝ้า กระ รอยดำ หรือเนื้อเยื่อแผลเป็น"
